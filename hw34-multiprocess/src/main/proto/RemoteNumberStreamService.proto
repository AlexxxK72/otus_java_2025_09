syntax = "proto3";

package ru.otus.protobuf;

option java_multiple_files = true;

message NumberRequest {
    int32 firstValue = 1;
    int32 lastValue = 2;
}

message NumberResponse {
    int32 value = 1;
}

service RemoteNumberStreamService {
    rpc streamNumbers (NumberRequest) returns (stream NumberResponse);
}
